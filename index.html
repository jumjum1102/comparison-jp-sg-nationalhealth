<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本 vs シンガポール 公的医療保険制度の比較</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #0D0D0D; color: #F0EDE8; }
    img { display: block; max-width: 100%; }
    button { font: inherit; }
    a { color: inherit; }

    :root {
      --gold: #D4A843;
      --gold-soft: #a9842a;
      --bg: #0D0D0D;
      --bg2: #0A0A0A;
      --panel: #111111;
      --panel2: #141414;
      --line: #1E1E1E;
      --muted: #8C8C8C;
      --text: #C9C5BE;
      --white: #F0EDE8;
      --jp: #C95555;
      --sg: #5B8DB8;
      --green: #5FA56C;
      --content-max: 1180px;
      --content-narrow: 980px;
    }

    .page-shell {
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
      font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    }

    .content-wrap {
      width: min(var(--content-max), calc(100vw - 32px));
      margin: 0 auto;
    }

    .content-wrap.narrow {
      width: min(var(--content-narrow), calc(100vw - 32px));
      margin: 0 auto;
    }

    .section-pad {
      padding: clamp(46px, 7vw, 96px) 0;
      border-bottom: 1px solid #1A1A1A;
    }

    .section-alt {
      background: var(--bg2);
    }

    .desktop-rail {
      position: fixed;
      top: 0;
      left: 0;
      width: 56px;
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      z-index: 220;
      overflow: hidden;
    }

    .desktop-main {
      margin-left: 56px;
    }

    .mobile-bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(13,13,13,0.97);
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 220;
      padding: 6px 0 10px;
      backdrop-filter: blur(14px);
    }

    .mobile-main {
      padding-bottom: 60px;
    }

    .hero-inner {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      position: relative;
      z-index: 2;
      padding-bottom: clamp(52px, 8vw, 76px);
    }

    .hero-copy {
      max-width: 820px;
    }

    .hero-title {
      font-size: clamp(30px, 6vw, 72px);
      line-height: 1.18;
      margin: 0 0 14px;
      word-break: keep-all;
      letter-spacing: 0.01em;
    }

    .hero-sub {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: clamp(14px, 2vw, 20px);
      color: #999;
      margin-bottom: 22px;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 28px 0 36px;
    }

    .section-photo {
      width: 100%;
      height: clamp(220px, 32vw, 360px);
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.75);
      margin-bottom: 28px;
      border-radius: 2px;
      border: 1px solid #1a1a1a;
    }

    .body-copy {
      font-size: clamp(14px, 1.2vw, 16px);
      line-height: 2;
      color: var(--text);
    }

    .small-copy {
      font-family: Inter, sans-serif;
      font-size: clamp(11px, 1vw, 12px);
      line-height: 1.9;
      color: var(--muted);
    }

    .panel {
      border: 1px solid #222;
      background: #111;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      font-family: Inter, sans-serif;
    }

    .compare-table th,
    .compare-table td {
      border-bottom: 1px solid #1E1E1E;
      padding: 14px 14px;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.8;
    }

    .compare-table th {
      text-align: left;
      font-size: 11px;
      letter-spacing: 1px;
      color: #777;
      background: #121212;
      font-weight: 700;
    }

    .compare-table .th-jp {
      color: #E48C8C;
      text-align: center;
    }

    .compare-table .th-sg {
      color: #88B6E0;
      text-align: center;
    }

    .compare-table td:first-child {
      color: #E8E2D8;
      font-weight: 700;
      width: 26%;
      background: #101010;
    }

    .compare-table td:nth-child(2),
    .compare-table td:nth-child(3) {
      color: var(--text);
      text-align: center;
      background: #0E0E0E;
    }

    .flow-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .flow-box {
      width: 100%;
      max-width: 640px;
      text-align: center;
      padding: 14px 18px;
      border: 1px solid #2B2B2B;
      background: #101010;
    }

    .flow-note {
      margin-top: 5px;
      color: #8A8A8A;
      font-size: 11px;
      line-height: 1.8;
      font-family: Inter, sans-serif;
    }

    .flow-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      color: var(--gold);
      font-family: Inter, sans-serif;
      font-size: 12px;
    }

    .cards-2,
    .cards-3,
    .cards-auto {
      display: grid;
      gap: 14px;
    }

    .cards-2,
    .cards-3,
    .cards-auto {
      grid-template-columns: 1fr;
    }

    .info-card {
      border: 1px solid #222;
      background: #101010;
      padding: 18px 16px;
    }

    .pill {
      display: inline-block;
      border: 1px solid #2E2E2E;
      color: #BEB8AF;
      padding: 3px 8px;
      font-size: 10px;
      line-height: 1.5;
      font-family: Inter, sans-serif;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .pill.jp { border-color: rgba(201,85,85,.35); color: #E7AEAE; }
    .pill.sg { border-color: rgba(91,141,184,.35); color: #A9C8E5; }
    .pill.good { border-color: rgba(95,165,108,.35); color: #8FD09A; }
    .pill.warn { border-color: rgba(212,168,67,.35); color: #D9B96A; }

    .quiz-wrap {
      border: 1px solid #222;
      background: linear-gradient(180deg, #111111 0%, #0d0d0d 100%);
      padding: 22px 18px;
      margin-bottom: 16px;
    }

    .quiz-btn {
      width: 100%;
      text-align: left;
      border: 1px solid #292929;
      background: #0F0F0F;
      color: #DDD7CF;
      padding: 12px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: .2s ease;
      font-family: Inter, sans-serif;
      font-size: 13px;
      line-height: 1.7;
    }

    .quiz-btn:hover {
      border-color: #3B3320;
      background: #12100b;
    }

    .quiz-btn.correct {
      border-color: rgba(95,165,108,.55);
      background: rgba(95,165,108,.12);
      color: #A6D8AE;
    }

    .quiz-btn.wrong {
      border-color: rgba(201,85,85,.55);
      background: rgba(201,85,85,.10);
      color: #E3A8A8;
    }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .summary-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .summary-bullet {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-family: Inter, sans-serif;
      font-weight: 700;
      margin-top: 2px;
      border: 1px solid #333;
      color: var(--gold);
    }

    .footer-inner {
      width: min(var(--content-narrow), calc(100vw - 32px));
      margin: 0 auto;
    }

    @media (min-width: 900px) {
      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .cards-2 {
        grid-template-columns: 1fr 1fr;
      }
      .cards-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .cards-auto {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1200px) {
      .cards-auto {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // GitHub Pages向け：Wikimedia Commons の画像ファイルへ直接リダイレクト
    const HERO_IMG = "https://commons.wikimedia.org/wiki/Special:Redirect/file/Bowyer%20Block%20at%20SGH.JPG";
    const INTRO_IMG = "https://commons.wikimedia.org/wiki/Special:Redirect/file/Tan%20Tock%20Seng%20Hospital%2C%20panorama%2C%20Aug%2006.jpg";
    const JAPAN_IMG = "https://commons.wikimedia.org/wiki/Special:Redirect/file/Tan%20Tock%20Seng%20Hospital%204%2C%20Aug%2006.JPG";
    const SG_IMG = "https://commons.wikimedia.org/wiki/Special:Redirect/file/Jurong%20-%20Ng%20Teng%20Fong%20General%20Hospital%20%282025%29%20-%20img%2001.jpg";
    const COMPARE_IMG = "https://commons.wikimedia.org/wiki/Special:Redirect/file/Ng%20Teng%20Fong%20General%20Hospital%20and%20Jurong%20Community%20Hospital.jpg";
    const MERIT_IMG = "https://commons.wikimedia.org/wiki/Special:Redirect/file/Tan%20Tock%20Seng%20Hospital%203%2C%20Aug%2006.JPG";

    const NAV_ITEMS = [
      { id: "hero", en: "TOP", ja: "TOP" },
      { id: "intro", en: "BASICS", ja: "基礎" },
      { id: "japan", en: "JAPAN", ja: "日本" },
      { id: "sg", en: "SINGAPORE", ja: "シンガポール" },
      { id: "compare", en: "COMPARE", ja: "比較" },
      { id: "merit", en: "MERITS", ja: "特徴" },
      { id: "quiz", en: "QUIZ", ja: "クイズ" },
      { id: "summary", en: "SUMMARY", ja: "まとめ" },
    ];

    const JP_RED = "#C95555";
    const SG_BLUE = "#5B8DB8";
    const GOLD = "#D4A843";
    const GREEN = "#5FA56C";
    const LINE = "#1E1E1E";
    const MUTED = "#8C8C8C";
    const TEXT = "#C9C5BE";
    const WHITE = "#F0EDE8";

    function useViewport() {
      const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
      useEffect(() => {
        const h = () => setW(window.innerWidth);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);
      return {
        width: w,
        isMobile: w < 640,
      };
    }

    function SectionHeader({ num, ja, en, compact=false }) {
      return (
        <div style={{ marginBottom: compact ? 26 : 44 }}>
          <div style={{ marginBottom: compact ? 16 : 32 }}>
            <div style={{ fontFamily: "Inter, sans-serif", fontSize: 9, letterSpacing: 3, color: GOLD, textTransform: "uppercase", marginBottom: 8 }}>
              {num}
            </div>
            <div style={{ fontSize: compact ? 20 : "clamp(22px,4vw,40px)", fontWeight: 700, lineHeight: 1.35, whiteSpace: "pre-wrap" }}>
              {ja}
            </div>
            <div style={{ fontFamily: "Georgia, serif", fontStyle: "italic", fontSize: 13, color: "#555", marginTop: 4 }}>
              {en}
            </div>
          </div>
          <div style={{ width: "100%", height: 1, background: LINE }} />
        </div>
      );
    }

    function MetricCard({ value, label }) {
      return (
        <div className="panel" style={{ padding: "18px 16px" }}>
          <div style={{ fontFamily: "Inter, sans-serif", fontSize: 30, fontWeight: 800, color: GOLD, lineHeight: 1 }}>{value}</div>
          <div style={{ fontFamily: "Inter, sans-serif", fontSize: 10, color: "#666", letterSpacing: 1, marginTop: 4 }}>{label}</div>
        </div>
      );
    }

    function FlowArrow() {
      return (
        <div className="flow-arrow">
          <div style={{ width: 1, height: 16, background: "#4A3E1A" }} />
          <div>▼</div>
        </div>
      );
    }

    function FlowBox({ title, note, accent="var(--gold)", dashed=false }) {
      return (
        <div
          className="flow-box"
          style={{
            border: `1px ${dashed ? "dashed" : "solid"} ${accent}`,
            background: "#101010"
          }}
        >
          <div style={{ fontSize: 14, lineHeight: 1.8, color: WHITE }}>{title}</div>
          <div className="flow-note">{note}</div>
        </div>
      );
    }

    function Quiz({ data }) {
      const [selected, setSelected] = useState(null);
      const answered = selected !== null;

      return (
        <div className="quiz-wrap">
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>{data.emoji} {data.title}</div>
          <div style={{ fontFamily: "Inter, sans-serif", fontSize: 14, lineHeight: 1.9, color: TEXT, marginBottom: 16 }}>
            {data.q}
          </div>

          {data.options.map((o, i) => {
            const cls = answered
              ? i === selected
                ? o.correct ? "quiz-btn correct" : "quiz-btn wrong"
                : o.correct
                ? "quiz-btn correct"
                : "quiz-btn"
              : "quiz-btn";

            return (
              <button
                key={i}
                className={cls}
                disabled={answered}
                onClick={() => setSelected(i)}
              >
                {o.text}
              </button>
            );
          })}

          {answered && (
            <div
              style={{
                marginTop: 8,
                border: `1px solid ${data.options[selected].correct ? "rgba(95,165,108,.45)" : "rgba(201,85,85,.45)"}`,
                background: data.options[selected].correct ? "rgba(95,165,108,.08)" : "rgba(201,85,85,.08)",
                padding: "12px 12px",
                fontFamily: "Inter, sans-serif",
                fontSize: 13,
                lineHeight: 1.9,
                color: TEXT
              }}
            >
              {data.explanation(data.options[selected].correct)}
            </div>
          )}
        </div>
      );
    }

    const quizData = [
      {
        emoji: "🏥",
        title: "クイズ ①",
        q: "日本の「高額療養費制度」とはどんな制度でしょうか？",
        options: [
          { text: "① 収入が低い人は医療費を全額免除してもらえる制度", correct: false },
          { text: "② 1か月の医療費の自己負担が一定の上限を超えたら払い戻してもらえる制度", correct: true },
          { text: "③ 高齢者だけが使える特別な制度", correct: false },
        ],
        explanation: (ok) =>
          ok
            ? "✅ 正解！ 高額療養費制度は1か月の自己負担が上限を超えた分を払い戻してもらえる制度です。大病でも経済的に破綻しないための重要な仕組みです。"
            : "❌ 正解は②です。収入に関係なく、1か月の自己負担が上限を超えた部分を後で払い戻してもらえる制度です。"
      },
      {
        emoji: "🇸🇬",
        title: "クイズ ②",
        q: "シンガポールのMediSave（メディセーブ）はどんな仕組みでしょうか？",
        options: [
          { text: "① 国がすべての国民に毎年配る医療費補助金", correct: false },
          { text: "② 民間の保険会社が売っている任意加入の保険", correct: false },
          { text: "③ 給料の一部を医療費のために強制的に個人口座に積み立てる制度", correct: true },
        ],
        explanation: (ok) =>
          ok
            ? "✅ 正解！ MediSaveは給料の約9〜10.5%が自動的に個人口座に積み立てられる「強制貯蓄」です。自分の入院・手術費などに使えます。"
            : "❌ 正解は③です。給料から自動で積み立てられる個人の医療費貯蓄口座です。"
      },
      {
        emoji: "⚖️",
        title: "クイズ ③",
        q: "シンガポールの公立病院の「等級制度」では、どの等級が最も政府補助が大きい？",
        options: [
          { text: "① Class A（個室・快適な設備）", correct: false },
          { text: "② Class B1（4人部屋）", correct: false },
          { text: "③ Class C（大部屋・8人以上）", correct: true },
        ],
        explanation: (ok) =>
          ok
            ? "✅ 正解！ Class C（大部屋）では最大約80%もの政府補助が受けられます。快適さを犠牲にする代わりに大きな支援を受けられる仕組みです。"
            : "❌ 正解は③のClass Cです。大部屋を選ぶほど政府補助が大きくなります。"
      }
    ];

    function App() {
      const { isMobile } = useViewport();
      const [active, setActive] = useState("hero");

      useEffect(() => {
        const obs = new IntersectionObserver(
          (entries) => entries.forEach((e) => {
            if (e.isIntersecting) setActive(e.target.id);
          }),
          { threshold: 0.28 }
        );

        NAV_ITEMS.forEach(({ id }) => {
          const el = document.getElementById(id);
          if (el) obs.observe(el);
        });

        return () => obs.disconnect();
      }, []);

      const go = (id) => {
        document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
        setActive(id);
      };

      const sectionPhotoStyle = {
        width: "100%",
        height: isMobile ? 220 : 320,
        objectFit: "cover",
        objectPosition: "center center",
        filter: "brightness(0.76)",
        marginBottom: 28,
        border: "1px solid #1a1a1a"
      };

      return (
        <div className="page-shell">
          {!isMobile && (
            <nav className="desktop-rail">
              <div style={{ writingMode: "vertical-rl", fontFamily: "Inter, sans-serif", fontSize: 10, letterSpacing: 4, color: MUTED, marginBottom: 28, textTransform: "uppercase" }}>
                Medical
              </div>
              {NAV_ITEMS.map(({ id, en }) => (
                <div key={id} onClick={() => go(id)} style={{ textAlign: "center", marginBottom: 2, cursor: "pointer" }}>
                  <div style={{ width: 4, height: 4, borderRadius: "50%", background: active === id ? GOLD : "#333", margin: "3px auto", transition: "background .3s" }} />
                  <div style={{ writingMode: "vertical-rl", fontSize: 8, letterSpacing: 2, color: active === id ? GOLD : "#444", padding: "8px 3px", textTransform: "uppercase", fontFamily: "Inter, sans-serif", transition: "color .3s" }}>
                    {en}
                  </div>
                </div>
              ))}
            </nav>
          )}

          {isMobile && (
            <nav className="mobile-bottom-nav">
              {NAV_ITEMS.map(({ id, en }) => (
                <div key={id} onClick={() => go(id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", padding: "2px 4px" }}>
                  <div style={{ width: 3, height: 3, borderRadius: "50%", background: active === id ? GOLD : "#333", transition: "background .3s" }} />
                  <div style={{ fontFamily: "Inter, sans-serif", fontSize: 8, letterSpacing: 1, color: active === id ? GOLD : "#444", textTransform: "uppercase", whiteSpace: "nowrap" }}>
                    {en}
                  </div>
                </div>
              ))}
            </nav>
          )}

          <div className={isMobile ? "mobile-main" : "desktop-main"}>
            <section id="hero" style={{ position: "relative", minHeight: isMobile ? "100svh" : "92vh", display: "flex", alignItems: "flex-end", overflow: "hidden" }}>
              <img
                src={HERO_IMG}
                alt="medical hero"
                style={{
                  position: "absolute",
                  inset: 0,
                  width: "100%",
                  height: "100%",
                  objectFit: "cover",
                  objectPosition: "center center",
                  filter: "brightness(0.34)"
                }}
              />
              <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(13,13,13,0.97) 0%, rgba(13,13,13,0.14) 55%)" }} />
              <div className="hero-inner">
                <div className="hero-copy">
                  <div style={{ fontFamily: "Inter, sans-serif", fontSize: 9, letterSpacing: isMobile ? 3 : 6, color: GOLD, marginBottom: 12, textTransform: "uppercase" }}>
                    Social Security Comparison Series — 01
                  </div>

                  <h1 className="hero-title">
                    日本 vs シンガポール<br />
                    公的医療保険制度の比較
                  </h1>

                  <div className="hero-sub">How Each Country Pays for Healthcare</div>

                  <div className="badge-row">
                    {[
                      "日本：国民皆保険",
                      "シンガポール：3M制度",
                      "高額療養費 / MediSave / MediShield Life"
                    ].map((b, i) => (
                      <span
                        key={i}
                        style={{
                          border: `1px solid ${i === 0 ? "rgba(201,85,85,.45)" : i === 1 ? "rgba(91,141,184,.45)" : GOLD}`,
                          color: i === 0 ? "#E7AEAE" : i === 1 ? "#A9C8E5" : GOLD,
                          fontSize: 9,
                          padding: "3px 8px",
                          letterSpacing: 1,
                          fontFamily: "Inter, sans-serif",
                          whiteSpace: "nowrap"
                        }}
                      >
                        {b}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            </section>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
